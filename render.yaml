services:
  - type: web
    name: visa-security-code-reviewer-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: SEED_DEMO
        value: "true"
      # Set the real key in the Render dashboard (never commit it).
      - key: ANTHROPIC_API_KEY
        sync: false
